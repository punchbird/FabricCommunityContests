name: Extract Round 2 CSVs

on:
  workflow_dispatch:
  push:
    paths:
      - "StarterFiles/Round 2 Source Files.zip"

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install unzip
        run: sudo apt-get install unzip

      - name: Extract ZIP
        run: |
          mkdir -p data
          unzip -o "StarterFiles/Round 2 Source Files.zip" -d data

      - name: Commit extracted CSVs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/*
          git commit -m "Update extracted Round 2 CSVs" || echo "No changes"
          git push origin main

